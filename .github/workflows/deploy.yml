name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1 - checkout code from GitHub
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2 - login to Docker Hub
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Step 3 - build Docker image with two tags
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/new-life-app:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/new-life-app:${{ github.sha }} \
            ./app

      # Step 4 - push both tags to Docker Hub
      - name: Push to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/new-life-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/new-life-app:${{ github.sha }}

      # Step 5 - SSH into EC2 and deploy
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop $(docker ps -q) || true
            docker rm $(docker ps -aq) || true
            docker pull ${{ secrets.DOCKER_USERNAME }}/new-life-app:latest
            docker run -d \
              --name new-life-container \
              -p 5000:5000 \
              -e S3_BUCKET="new-life-dev-s3" \
              -e AWS_REGION="us-east-1" \
              ${{ secrets.DOCKER_USERNAME }}/new-life-app:latest


