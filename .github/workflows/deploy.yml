name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/new-life-app:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/new-life-app:${{ github.sha }} \
            ./app

      - name: Push to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/new-life-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/new-life-app:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if ! command -v docker-compose &> /dev/null; then
              sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
            fi

            mkdir -p /home/ubuntu/app && cd /home/ubuntu/app

            cat > docker-compose.yml << 'EOF'
            services:
              app:
                image: alamina/new-life-app:latest
                ports:
                  - "5000:5000"
                environment:
                  - S3_BUCKET=new-life-dev-s3
                  - AWS_REGION=us-east-1
                  - DB_HOST=database
                  - DB_NAME=uploadsdb
                  - DB_USER=admin
                  - DB_PASSWORD=password
                depends_on:
                  database:
                    condition: service_healthy

              database:
                image: postgres:15
                environment:
                  - POSTGRES_DB=uploadsdb
                  - POSTGRES_USER=admin
                  - POSTGRES_PASSWORD=password
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U admin -d uploadsdb"]
                  interval: 5s
                  timeout: 5s
                  retries: 5

            volumes:
              postgres_data:
            EOF

            docker-compose down || true
            docker-compose pull
            docker-compose up -d